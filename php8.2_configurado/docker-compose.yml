version: '3.8'

services:
  app:
    build: .
    container_name: app
    working_dir: /var/www
    volumes:
      - ../:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: mariadb:10.6
    container_name: db
    restart: always
    environment:
      MYSQL_DATABASE: sgl
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: user
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db

volumes:
  db_data: